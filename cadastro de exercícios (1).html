<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Questão</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #00e1e1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'DM Sans', sans-serif;
        }

        .container {
            background: #fff;
            width: 900px;
            padding: 30px 40px;
            border-radius: 8px;
        }

        /* Título */
        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .icon {
            background: #f4c430;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .title h2 {
            font-size: 25px;
            margin: 0;
            text-decoration: underline;
        }

        /* Grid */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 40px;
            font-family: 'DM Sans', sans-serif;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14.5px;
            margin-bottom: 5px;
            font-weight: bold;
            font-family: 'DM Sans', sans-serif;
        }

        input, select {
            padding: 8px 10px;
            border: 1px solid #999;
            border-radius: 5px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
        }

        input::placeholder {
            color: #aaa;
            font-family: 'DM Sans', sans-serif;
        }

        /* Conteúdo maior */
        .full {
            grid-column: span 2;
        }

        /* Rádio buttons */
        .radios {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radios label {
            font-weight: normal;
        }

        /* Botão */
        .btn {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            background: #1f5fa6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }

        button:hover {
            background: #174b85;
            
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">
            <div class="icon">?</div>
            <h2>Nova Questão</h2>
        </div>

        <form>
            <div class="field">
                <label>Enunciado</label>
                <input type="text" placeholder="Digite um Enunciado...">
            </div>

            <div class="field">
                <label>Alternativa D</label>
                <input type="text" placeholder="Digite algo...">
            </div>

            <div class="field">
                <label>Alternativa A</label>
                <input type="text" placeholder="Digite algo...">
            </div>

            <div class="field">
                <label>Alternativa Correta</label>
                <select>
                    <option selected disabled>Selecione...</option>
                    <option>A</option>
                    <option>B</option>
                    <option>C</option>
                    <option>D</option>
                </select>
            </div>

            <div class="field">
                <label>Alternativa B</label>
                <input type="text" placeholder="Digite algo...">
            </div>

            <div class="field">
                <label>Disciplina</label>
                <select>
                    <option selected disabled>Selecione...</option>
                    <option>Matemática</option>
                    <option>Português</option>
                    <option>História</option>
                    <option>Geografia</option>
                    <option>Artes</option>
                    <option>Inglês</option>
                    <option>Ciências</option>
                </select>
            </div>

            <div class="field">
                <label>Alternativa C</label>
                <input type="text" placeholder="Digite algo...">
            </div>

            <div class="field">
                <label>Conteúdo</label>
                <input type="text" placeholder="Digite o conteúdo da questão...">
            </div>

            <div class="field full">
                <label>Nível de Dificuldade</label>
                <div class="radios">
                    <label><input type="radio" name="nivel"> Fácil</label>
                    <label><input type="radio" name="nivel"> Médio</label>
                    <label><input type="radio" name="nivel"> Difícil</label>
                </div>
            </div>

            <div class="btn">
                <button type="submit">Cadastrar Questão</button>
            </div>
        </form>
    </div>

</body>
</html>
