<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #00e1e1;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        
        .form-container h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 70px;
            color: #000;
            width: 1000px;
            font-size: 40px;
        }

        .form-container h2 {
            font-size: 34px;
            font-weight: 700;
            text-align: center;
            margin-top: 0;
            margin-bottom: 32px;
            color: #000;
            position: relative;
            display: inline-block;
        }

        .form-container h2::before {
            content: "";
            position: absolute;
            left: -1px;
            bottom: -2px;
            width: calc(30% + 700px);
            height: 55px;
            background-color: rgba(255, 255, 255, 0.658);
            z-index: -1;
            border-radius: 2px;
        }


        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 50px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
            color: #000;
        }

        input, select {
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #00b3b3;
        }

        .btn {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            margin-top: 60px;
        }

        button {
            width: 50%;
            padding: 14px;
            background-color: #22609b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #daa700;
        }

        input::placeholder,
        select {
            font-size: 15px;
        }

    </style>
</head>

<body>

    <div class="form-container">
        <h2 class="title">Cadastra-se aqui</h2>
        <form>
            <div class="field">
                <input type="text" placeholder="Nome de usuário">
            </div>        
            <div class="field">
                <input type="email" placeholder="Email">
            </div>
            <div class="field">
                <input type="password" placeholder="Senha">
            </div>
            <div class="field">
                <select>
                    <option selected disabled>Grau escolar</option>
                    <option>Jardim I</option>
                    <option>Jardim II</option>
                    <option>1º ano</option>
                    <option>2º ano</option>
                    <option>3º ano</option>
                    <option>4º ano</option>
                    <option>5º ano</option>
                    <option>6º ano</option>
                    <option>7º ano</option>
                    <option>8º ano</option>
                    <option>9º ano</option>
                </select>
            </div>

            <div class="field">
                <input type="password" placeholder="Confirme sua senha">
            </div>

            <div class="field">
                <input type="date">
            </div>

            <div class="btn">
                <button type="submit">Cadastrar-se</button>
            </div>
        </form>
    </div>

    
</body>
</html>
